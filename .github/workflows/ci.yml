name: ci
on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  PGRX_VERSION: "0.16"

jobs:
  fmt:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt }
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        pg: ["14", "15", "16", "17"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy }
      - uses: ./.github/actions/setup-pgrx
        with: { pg: "${{ matrix.pg }}" }
      - run: cargo clippy --no-default-features --features pg${{ matrix.pg }} -- -D warnings

  test:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        pg: ["14", "15", "16", "17"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-pgrx
        with: { pg: "${{ matrix.pg }}" }
      - run: cargo pgrx test --no-default-features --features pg${{ matrix.pg }} pg${{ matrix.pg }}

  # Compose-based regression suite. Mirrors the local dev loop
  # (`just build-ext && just test-regression`) byte-for-byte: builds the
  # .so inside `compose/builder.Containerfile`, boots the
  # `postgres:17.4-bookworm` runtime with the artifacts bind-mounted,
  # then drives `tests/regression/sql/NN-*.sql` against it.
  #
  # Lives outside the per-PG matrix because the compose stack is
  # pinned to PG 17 today (see specs/ERRATA.v0.2.md E-006 for the
  # pgrx-vs-newer-PG block). Once PG 18 unblocks the matrix here
  # widens.
  regression:
    runs-on: ubuntu-22.04
    needs: test
    env:
      PGRDF_CONTAINER: pgrdf-pgrdf-postgres
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build extension artifacts
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          set -euo pipefail
          docker build --target builder \
            -t pgrdf-builder-rust:pg17 \
            --build-arg PG_MAJOR=17 \
            -f compose/builder.Containerfile .
          docker build \
            -t pgrdf-builder:pg17 \
            --build-arg PG_MAJOR=17 \
            -f compose/builder.Containerfile .
          rm -rf compose/extensions/lib compose/extensions/share
          mkdir -p compose/extensions/lib compose/extensions/share/extension
          docker run --rm \
            -v "$PWD/compose/extensions:/export" \
            pgrdf-builder:pg17
          ls -la compose/extensions/lib compose/extensions/share/extension
      - name: Pre-pull postgres image (retry on transient Hub flakes)
        run: |
          set -euo pipefail
          # Docker Hub occasionally returns 5xx on anonymous pulls.
          # Retry up to 5× with a short backoff so a transient Hub
          # flake doesn't fail the whole job.
          for i in 1 2 3 4 5; do
            if docker pull docker.io/library/postgres:17.4-bookworm; then
              exit 0
            fi
            echo "pull attempt $i failed; sleeping before retry"
            sleep $((i * 5))
          done
          echo "pull failed after 5 attempts"
          exit 1
      - name: Boot compose Postgres
        run: |
          set -euo pipefail
          cd compose && docker compose up -d
          # The compose service includes a healthcheck; wait on it.
          for i in $(seq 1 30); do
            status=$(docker inspect -f '{{.State.Health.Status}}' "${PGRDF_CONTAINER}" 2>/dev/null || echo "starting")
            echo "postgres health: $status"
            [ "$status" = "healthy" ] && break
            sleep 2
          done
          docker exec "${PGRDF_CONTAINER}" pg_isready -U pgrdf -d pgrdf
          docker exec "${PGRDF_CONTAINER}" psql -U pgrdf -d pgrdf -v ON_ERROR_STOP=1 \
            -c "CREATE EXTENSION IF NOT EXISTS pgrdf;"
      - name: Verify installed artifact parity
        env:
          PGRDF_RUNTIME: docker
          PGRDF_BUILD_RUNTIME: docker
        run: bash tests/regression/scripts/verify-installed-artifacts.sh
      - name: Run regression suite
        env:
          PGRDF_RUNTIME: docker
        run: bash tests/regression/run.sh
      - name: Run W3C-shape SPARQL harness
        env:
          PGRDF_RUNTIME: docker
        # 51 hand-authored W3C-shape fixtures covering W3C SPARQL 1.1
        # SELECT / ASK / GRAPH / UPDATE / CONSTRUCT / DESCRIBE /
        # property-path / type-aware-ORDER-BY patterns + the Phase G
        # surface (48-51: RDFS/OWL-RL reasoning-profile-sensitive
        # queries, TriG- and N-Quads-loaded GRAPH-scoped queries).
        # See the `kind` / `setup.sql` conventions in
        # tests/w3c-sparql/README.md.
        run: bash tests/w3c-sparql/run.sh
      - name: Run W3C SHACL Core manifest gate
        env:
          PGRDF_RUNTIME: docker
        # v0.5-FUTURE §6 — a vendored, hermetic subset of the W3C
        # data-shapes-test-suite SHACL Core tests (checked in, never
        # fetched at test time). REAL gate (no continue-on-error /
        # if:false): the Core suite is a genuine full-pass (25/25)
        # on the W3C sh:conforms invariant, no exclusion. (The
        # earlier "prop-nodeKind-001 excluded for an upstream
        # sh:nodeKind bug" claim was a G3 unverified assumption — the
        # fixture had been committed straight into fixtures/excluded/
        # so run.sh never ran it; investigation at v0.5.0-rc1 found
        # no upstream bug, pgRDF produces the W3C-authoritative
        # conforms:false / 27 violations, and the fixture is now
        # graded in fixtures/core/. See specs/ERRATA.v0.5.md E-013.)
        # The pgrx `test` matrix job (PG14-17) additionally exercises
        # pgrdf.validate's SHACL path on every PG major via the
        # #[pg_test] SHACL tests; the compose stack is PG17 (E-006 —
        # same scoping the regression/w3c-sparql/LUBM steps in this
        # job already use).
        run: bash tests/w3c-shacl/run.sh
      - name: Run W3C SHACL --sparql known-state assertion
        env:
          PGRDF_RUNTIME: docker
        # ERRATA.v0.5 E-012 — shacl 0.3.1's SparqlEngine is an
        # upstream stub (unimplemented!). 'sparql' mode returns a
        # deterministic structured report; this asserts that bounded
        # KNOWN STATE (conforms:null for every fixture) — NOT a raw
        # failure, NOT continue-on-error. Promotes toward full-pass
        # when a rudof release ships the engine (E-012 re-check).
        run: bash tests/w3c-shacl/run.sh --sparql
      - name: Run LUBM-shape correctness gate
        env:
          PGRDF_RUNTIME: docker
        # Phase 6 step 3 scaffolding: 3 hand-authored LUBM-shape
        # queries against a small fixture. Real LUBM-1/10/100 with
        # the Java generator + cross-engine comparison vs Jena TDB /
        # Apache AGE is v0.4 work — see tests/perf/README.md.
        run: bash tests/perf/lubm-shape/run.sh
      - name: Postgres logs (on failure)
        if: failure()
        run: docker logs "${PGRDF_CONTAINER}" | tail -100
      - name: Tear down compose
        if: always()
        run: cd compose && docker compose down -v

  # PLACEHOLDER — W3C SPARQL 1.1 + SHACL conformance runners + LUBM
  # benchmarks. Lives in `.github/workflows/regression-w3c.yml` with
  # `if: false` job gates until the runners exist. Tracked in
  # `docs/10-roadmap.md` Phase 6.
