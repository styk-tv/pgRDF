name: oci-publish
on:
  # release.published fires for releases created by a human (or a PAT),
  # but is BLOCKED by GitHub when the release is created by another
  # workflow using the default GITHUB_TOKEN — a security boundary against
  # workflow recursion. Releases authored by github-actions[bot] (the
  # default `softprops/action-gh-release` flow) never trigger this
  # workflow via the `release` event.
  #
  # `repository_dispatch` chained from release.yml is the standard
  # workaround: release.yml's final step POSTs to the dispatches API
  # with `event_type=oci-publish-release` and `client_payload.tag`.
  # This event fires reliably under GITHUB_TOKEN.
  release:
    types: [published]
  repository_dispatch:
    types: [oci-publish-release]
  workflow_dispatch:
    inputs:
      tag:
        description: "release tag e.g. v0.5.0"
        required: true

permissions:
  # `contents: write` is required by the final dispatch step in the
  # index job (`POST /repos/.../dispatches`) — GitHub's
  # repository_dispatch endpoint demands a token with write access to
  # the repo, even though no commit or push actually happens. Without
  # it the dispatch returns 403 "Resource not accessible by
  # integration" and the index job fails AFTER the bundle has been
  # pushed + attested (v0.5.12 hit exactly this). `contents: read`
  # was sufficient until the dispatch step was added in 83ceb44.
  contents: write
  packages: write
  # SLSA Build Provenance v1 needs Sigstore-backed OIDC tokens +
  # attestation API write access. Every leaf and every aggregate
  # index pushed by this workflow carries an attestation that
  # `gh attestation verify` can check.
  id-token: write
  attestations: write

jobs:
  # ────────────────────────────────────────────────────────────────
  # PRE-ATTEST BOOT+VERSION GATE (PROVENANCE.md Rule 7).
  #
  # Boot a clean postgres:17.4-bookworm and install the EXACT release-
  # tarball bytes the leaf job is about to push, then assert the running
  # extension reports the tag version. This job is a hard prerequisite
  # of the leaf publish+attest job (`leaf: needs: gate`), so NO
  # attestation is ever issued unless a container started and
  # pgrdf.version() matched the tag. Fail here ⇒ nothing pushed, nothing
  # attested, the GitHub release stays a draft, LATEST.md never advances.
  # bookworm is the contractual base (NOTIFY: pgrdf-owns-pg-base-release).
  # ────────────────────────────────────────────────────────────────
  gate:
    name: pre-attest boot+version gate (pg17-amd64)
    runs-on: ubuntu-22.04
    steps:
      - name: Resolve tag/version
        id: v
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name || github.event.client_payload.tag || github.event.inputs.tag }}"
          case "$TAG" in
            v*) ;;
            *) echo "oci-publish gate: '$TAG' is not a release tag; aborting"; exit 1 ;;
          esac
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"
          echo "ver=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download release tarball (pg17-amd64)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VER="${{ steps.v.outputs.ver }}"
          mkdir -p gate/dl && cd gate/dl
          gh release download "${{ steps.v.outputs.tag }}" \
            --repo styk-tv/pgRDF \
            --pattern "pgrdf-${VER}-pg17-glibc-amd64.tar.gz"

      - name: Boot postgres + assert CREATE EXTENSION + version match
        run: |
          set -euo pipefail
          VER="${{ steps.v.outputs.ver }}"
          tar -xzf gate/dl/*.tar.gz -C gate/
          EXTRACT="gate/pgrdf-${VER}-pg17-glibc-amd64"
          [ -d "${EXTRACT}" ] || { echo "::error::extract dir ${EXTRACT} missing"; ls -la gate/ || true; exit 1; }

          docker run --rm -d --name gate-pg \
            -e POSTGRES_PASSWORD=v -e POSTGRES_USER=v -e POSTGRES_DB=v \
            postgres:17.4-bookworm
          # Wait on a real query against db `v`, NOT bare pg_isready:
          # pg_isready can report "ready" against the initdb bootstrap server,
          # which then shuts down before the real server accepts CREATE EXTENSION
          # ("FATAL: the database system is shutting down" — the v0.6.18 gate
          # flake). A successful `SELECT 1` on db `v` only lands on the final,
          # queryable server (the bootstrap server has no `v` role/db).
          for i in $(seq 1 30); do
            docker exec gate-pg psql -U v -d v -tAc "SELECT 1" >/dev/null 2>&1 && break
            sleep 1
          done

          docker cp "${EXTRACT}/lib/pgrdf.so"                  gate-pg:/usr/lib/postgresql/17/lib/pgrdf.so
          docker cp "${EXTRACT}/share/extension/pgrdf.control" gate-pg:/usr/share/postgresql/17/extension/pgrdf.control
          for f in "${EXTRACT}"/share/extension/*.sql; do
            docker cp "${f}" "gate-pg:/usr/share/postgresql/17/extension/$(basename "${f}")"
          done

          set +e
          docker exec gate-pg psql -U v -d v -v ON_ERROR_STOP=1 -c \
            "CREATE EXTENSION pgrdf VERSION '${VER}';" 2>&1 | tee gate-create.log
          CREATE_RC=$?
          set -e
          EXT_VER=$(docker exec gate-pg psql -U v -d v -A -t -c \
            "SELECT extversion FROM pg_extension WHERE extname='pgrdf';" 2>&1 || true)
          FN_VER=$(docker exec gate-pg psql -U v -d v -A -t -c \
            "SELECT pgrdf.version();" 2>&1 || true)
          docker rm -f gate-pg >/dev/null 2>&1 || true

          [ "${CREATE_RC}" -eq 0 ] || { echo "::error::CREATE EXTENSION pgrdf VERSION '${VER}' FAILED — refusing to attest."; exit 1; }
          [ "${EXT_VER}" = "${VER}" ] || { echo "::error::extversion='${EXT_VER}' != '${VER}' — refusing to attest."; exit 1; }
          [ "${FN_VER}" = "${VER}" ] || { echo "::error::pgrdf.version()='${FN_VER}' != '${VER}' — refusing to attest."; exit 1; }
          # MANIFEST.json cross-check (#37): the bundle's self-described runtime
          # value must equal the version the booted .so ACTUALLY reports — i.e.
          # validate the manifest against the artifact, not the source. Present
          # on every release cut after the manifest landed; if absent (older
          # tarball) the check is skipped so re-runs of historical tags still pass.
          MAN="${EXTRACT}/MANIFEST.json"
          if [ -f "${MAN}" ]; then
            MAN_RT=$(jq -r '.runtime.value' "${MAN}")
            [ "${MAN_RT}" = "${FN_VER}" ] || { echo "::error::MANIFEST.json runtime.value='${MAN_RT}' != booted pgrdf.version()='${FN_VER}' — refusing to attest."; exit 1; }
            echo "✓ MANIFEST.json runtime cross-check: ${MAN_RT} == pgrdf.version()"
          else
            echo "note: no MANIFEST.json in this tarball (pre-#37 release) — skipping manifest cross-check."
          fi
          echo "✓ boot+version gate passed: extversion=${EXT_VER}, pgrdf.version()=${FN_VER} — attestation may proceed."

  # ────────────────────────────────────────────────────────────────
  # Per-PG×arch leaf publish + attestation. Matrix-shaped so each
  # (pg, arch) is its own job — that's the only clean way to attach
  # an SLSA Build Provenance v1 attestation per artifact via
  # actions/attest-build-provenance@v1 (the action takes one
  # `subject-digest` per invocation).
  # ────────────────────────────────────────────────────────────────
  leaf:
    name: leaf (pg${{ matrix.pg }}-${{ matrix.arch }})
    # Attestation gateway: the leaf job pushes AND attests, so it must
    # not start until the boot+version gate above has passed.
    needs: gate
    strategy:
      fail-fast: false
      matrix:
        # STABILIZATION WINDOW — matrix cut to pg17 only. See the
        # release.yml block for context. Do NOT delete the previous
        # full matrix below; it will be restored verbatim once the
        # multi-PG bar is stable again.
        # pg: ["14", "15", "16", "17"]
        pg: ["17"]
        arch: [amd64, arm64]
    runs-on: ubuntu-22.04
    env:
      REG: ghcr.io/styk-tv/pgrdf-bundle
    outputs:
      tag: ${{ steps.v.outputs.tag }}
      ver: ${{ steps.v.outputs.ver }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag/version
        id: v
        run: |
          set -euo pipefail
          # Three trigger paths, each carries the tag in a different shape:
          # - release.published     → github.event.release.tag_name
          # - repository_dispatch   → github.event.client_payload.tag
          # - workflow_dispatch     → github.event.inputs.tag
          TAG="${{ github.event.release.tag_name || github.event.client_payload.tag || github.event.inputs.tag }}"
          case "$TAG" in
            v*) ;;
            *) echo "oci-publish: '$TAG' is not a release tag; aborting"; exit 1 ;;
          esac
          echo "tag=$TAG"      >> "$GITHUB_OUTPUT"
          echo "ver=${TAG#v}"  >> "$GITHUB_OUTPUT"

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Download release tarball (matrix slice)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VER="${{ steps.v.outputs.ver }}"
          mkdir -p dist && cd dist
          # Only fetch the one tarball this job needs.
          gh release download "${{ steps.v.outputs.tag }}" \
            --repo styk-tv/pgRDF \
            --pattern "pgrdf-${VER}-pg${{ matrix.pg }}-glibc-${{ matrix.arch }}.tar.gz"

      - name: ghcr login
        run: echo "${{ github.token }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push leaf artifact
        id: push
        working-directory: dist
        run: |
          set -euo pipefail
          VER="${{ steps.v.outputs.ver }}"
          PG="${{ matrix.pg }}"
          ARCH="${{ matrix.arch }}"
          F="pgrdf-${VER}-pg${PG}-glibc-${ARCH}.tar.gz"
          TAG="${VER}-pg${PG}-${ARCH}"
          [ -f "$F" ] || { echo "missing $F"; exit 1; }
          oras push "${REG}:${TAG}" \
            --artifact-type application/vnd.styk.pgrdf.bundle.v1+tar \
            --annotation "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --annotation "org.opencontainers.image.version=${VER}" \
            --annotation "io.styk.pgrdf.pg=${PG}" \
            --annotation "io.styk.pgrdf.arch=${ARCH}" \
            "${F}:application/vnd.styk.pgrdf.tarball.v1+gzip"
          # Capture the manifest digest for the attestation step.
          DIGEST=$(oras manifest fetch --descriptor "${REG}:${TAG}" | jq -r .digest)
          echo "repo=${REG}"     >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"      >> "$GITHUB_OUTPUT"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      # SLSA Build Provenance v1. Sigstore-backed; pushes the
      # attestation as an OCI referrer alongside the artifact, so
      # `gh attestation verify oci://...:<tag>` works on every leaf.
      # Per PROVENANCE.md, the downstream update-latest-md workflow
      # refuses to advance LATEST.md unless this verifies.
      - name: Attest leaf
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ steps.push.outputs.repo }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  # ────────────────────────────────────────────────────────────────
  # Aggregate :VER and :vTAG indexes. Runs after every leaf publishes
  # successfully (matrix fail-fast=false so partial pushes still
  # produce indexable leaves; the index job will fail if any leaf is
  # missing — that's the right behaviour, indexes shouldn't reference
  # absent digests).
  # ────────────────────────────────────────────────────────────────
  index:
    needs: leaf
    runs-on: ubuntu-22.04
    env:
      REG: ghcr.io/styk-tv/pgrdf-bundle
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag/version
        id: v
        run: |
          set -euo pipefail
          # Take from any leaf's output (they all see the same tag).
          TAG="${{ needs.leaf.outputs.tag }}"
          VER="${{ needs.leaf.outputs.ver }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ver=$VER" >> "$GITHUB_OUTPUT"

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: ghcr login
        run: echo "${{ github.token }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build aggregate indexes :VER and :vTAG
        id: index
        run: |
          set -euo pipefail
          VER="${{ steps.v.outputs.ver }}"
          TAG="${{ steps.v.outputs.tag }}"
          REFS=""
          # STABILIZATION WINDOW — only pg17 leaves are produced by
          # the matrix above. Aggregate index references the pg17 ×
          # {amd64, arm64} pair only. Do NOT delete the full-matrix
          # form below; it will be restored verbatim once pg14/15/16
          # come back into the leaf matrix.
          # for pg in 14 15 16 17; do for arch in amd64 arm64; do
          #   REFS="$REFS ${REG}:${VER}-pg${pg}-${arch}"
          # done; done
          for pg in 17; do for arch in amd64 arm64; do
            REFS="$REFS ${REG}:${VER}-pg${pg}-${arch}"
          done; done
          oras manifest index create "${REG}:${VER}" $REFS
          oras manifest index create "${REG}:${TAG}" $REFS
          # Capture the index digest for the attestation. Both VER and
          # TAG tags resolve to the same index manifest, so one digest
          # covers both names — attest once, advertise both.
          DIGEST_VER=$(oras manifest fetch --descriptor "${REG}:${VER}" | jq -r .digest)
          DIGEST_TAG=$(oras manifest fetch --descriptor "${REG}:${TAG}" | jq -r .digest)
          if [ "$DIGEST_VER" != "$DIGEST_TAG" ]; then
            echo "index digests diverged between :${VER} and :${TAG} — aborting"; exit 1
          fi
          echo "repo=${REG}"     >> "$GITHUB_OUTPUT"
          echo "digest=${DIGEST_VER}" >> "$GITHUB_OUTPUT"

      # Attest the aggregate index manifest. Consumers can then run
      # `gh attestation verify oci://ghcr.io/styk-tv/pgrdf-bundle:0.5.10`
      # to confirm the multi-arch / multi-PG bundle is the same one this
      # workflow run produced.
      - name: Attest aggregate index
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ steps.index.outputs.repo }}
          subject-digest: ${{ steps.index.outputs.digest }}
          push-to-registry: true

      # Post-publish consumer-style smoke verify (PROVENANCE.md
      # Rule 7). Pulls the just-published artifact via ORAS exactly
      # as a downstream consumer would, drops the files into a clean
      # `postgres:17.4-bookworm` container, and runs
      # `CREATE EXTENSION pgrdf VERSION '<TAG>'` — the precise call
      # OCI-GERMINATION's report 2026-05-30 showed was failing on
      # every v0.5.2..v0.5.23 release because of the Cargo.toml-stuck-
      # at-0.5.1 bug. Fail-fast here means update-latest-md.yml never
      # fires, LATEST.md stays at the prior version, and consumers
      # never see a broken tag advertised. We verify amd64 only —
      # arm64 has the same bytes structure; if amd64 is well-formed,
      # arm64 is too. (Adding arm64 would need a self-hosted arm
      # runner; deferred.)
      - name: Post-publish — consumer-style smoke verify (amd64)
        run: |
          set -euo pipefail
          VER="${{ steps.v.outputs.ver }}"
          REG="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/pgrdf-bundle"

          # Pull the published artifact and extract the tarball.
          mkdir -p smoke-verify/dl
          oras pull "${REG}:${VER}-pg17-amd64" -o smoke-verify/dl
          tar -xzf smoke-verify/dl/*.tar.gz -C smoke-verify/

          # The extracted dir is `pgrdf-<ver>-pg17-glibc-amd64/`.
          EXTRACT="smoke-verify/pgrdf-${VER}-pg17-glibc-amd64"
          if [ ! -d "${EXTRACT}" ]; then
            echo "::error::extracted dir ${EXTRACT} missing — tarball layout drift?"
            ls -la smoke-verify/ || true
            exit 1
          fi

          # Boot a clean postgres + copy in the files exactly as the
          # SPEC.pgRDF.INSTALL.v0.2 §3 layout instructs.
          docker run --rm -d --name smoke-pg \
            -e POSTGRES_PASSWORD=v -e POSTGRES_USER=v -e POSTGRES_DB=v \
            postgres:17.4-bookworm
          # Same readiness fix as the boot gate — wait on a real SELECT 1 so we
          # never race the initdb bootstrap-server shutdown window.
          for i in $(seq 1 30); do
            docker exec smoke-pg psql -U v -d v -tAc "SELECT 1" >/dev/null 2>&1 && break
            sleep 1
          done

          docker cp "${EXTRACT}/lib/pgrdf.so"            smoke-pg:/usr/lib/postgresql/17/lib/pgrdf.so
          docker cp "${EXTRACT}/share/extension/pgrdf.control" smoke-pg:/usr/share/postgresql/17/extension/pgrdf.control
          # Copy every SQL file (the install script + any upgrade
          # paths shipped alongside).
          for f in "${EXTRACT}"/share/extension/*.sql; do
            docker cp "${f}" "smoke-pg:/usr/share/postgresql/17/extension/$(basename ${f})"
          done

          # The actual gate: install with the TAG version pinned.
          # Any drift (Cargo.toml stuck, SQL renamed, control wrong)
          # makes this exact statement fail.
          set +e
          docker exec smoke-pg psql -U v -d v -v ON_ERROR_STOP=1 -c \
            "CREATE EXTENSION pgrdf VERSION '${VER}';" 2>&1 | tee smoke-create.log
          CREATE_RC=$?
          set -e

          # Read back to confirm.
          EXT_VER=$(docker exec smoke-pg psql -U v -d v -A -t -c \
            "SELECT extversion FROM pg_extension WHERE extname='pgrdf';" 2>&1 || true)
          FN_VER=$(docker exec smoke-pg psql -U v -d v -A -t -c \
            "SELECT pgrdf.version();" 2>&1 || true)

          docker rm -f smoke-pg >/dev/null 2>&1 || true

          if [ "${CREATE_RC}" -ne 0 ]; then
            echo "::error::CREATE EXTENSION pgrdf VERSION '${VER}' FAILED"
            echo "::error::This is the OCI-GERMINATION-class failure from v0.5.1-stuck."
            echo "::error::Aborting BEFORE update-latest-md.yml fires. LATEST.md stays at prior version."
            exit 1
          fi
          if [ "${EXT_VER}" != "${VER}" ]; then
            echo "::error::pg_extension.extversion='${EXT_VER}' but expected '${VER}'"
            exit 1
          fi
          if [ "${FN_VER}" != "${VER}" ]; then
            echo "::error::pgrdf.version()='${FN_VER}' but expected '${VER}'"
            exit 1
          fi
          echo "✓ Consumer-style install OK: extversion=${EXT_VER}, pgrdf.version()=${FN_VER}"

      # Chain update-latest-md.yml via repository_dispatch.
      #
      # This workflow was itself triggered by GITHUB_TOKEN (via the
      # repository_dispatch from release.yml), so its completion does
      # NOT fire `workflow_run` events for downstream workflows — the
      # same GitHub security boundary that blocks release.published
      # from cascading. `repository_dispatch` IS allowed to fire from
      # GITHUB_TOKEN-triggered runs (the boundary applies only to
      # `workflow_run`), so we use the same pattern we used in dd55afb
      # to bridge release.yml → oci-publish.yml and extend it one more
      # hop: oci-publish.yml → update-latest-md.yml.
      - name: Trigger update-latest-md workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.v.outputs.tag }}"
          echo "Dispatching latest-md-refresh for ${TAG}"
          gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/dispatches" \
            -f event_type=latest-md-refresh \
            -F "client_payload[tag]=${TAG}"
