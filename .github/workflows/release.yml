name: release
on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  PGRX_VERSION: "0.16"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # STABILIZATION WINDOW — matrix cut to pg17 only while we
        # work on a string of intermittent pg15/amd64 build flakes
        # (first surfaced on v0.5.20 release.yml run 26635709923).
        # The previous full matrix `pg: ["14", "15", "16", "17"]`
        # is preserved in the comment below; do NOT delete it. It
        # WILL be restored verbatim once the stabilization work
        # lands and we have a clean run on the multi-PG bar.
        # pg: ["14", "15", "16", "17"]
        pg: ["17"]
        arch: [amd64, arm64]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-22.04' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-pgrx
        with: { pg: "${{ matrix.pg }}" }

      # Pre-build version-coherence gate (PROVENANCE.md Rule 7).
      #
      # There are TWO sources of truth pgrx packages into the
      # consumer-facing tarball:
      #   (a) `Cargo.toml`'s `version` field — drives the SQL
      #       install filename, `pgrdf--<ver>.sql`.
      #   (b) repo-root `pgrdf.control`'s `default_version` field —
      #       pgrx copies this file verbatim into the install dir;
      #       PostgreSQL reads it to decide which install script
      #       to run when a consumer says `CREATE EXTENSION pgrdf`.
      # Both MUST equal the tag (with leading `v` stripped). If
      # either drifts, `CREATE EXTENSION pgrdf VERSION '<tag>'`
      # fails — exactly the v0.5.1-stuck bug surfaced by
      # OCI-GERMINATION 2026-05-30.
      #
      # Failure aborts the build before any artifact gets cut. A
      # tag mismatch never reaches GHCR. See PROVENANCE.md Rule 7
      # + _WIP/NOTIFIES.oci-germination.0.5.23.* for context.
      - name: Pre-build — assert Cargo.toml + pgrdf.control + META.json match tag
        run: |
          set -euo pipefail
          TAG_VER="${GITHUB_REF_NAME#v}"
          CARGO_VER=$(grep -E '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
          CTL_VER=$(sed -n "s/^default_version = '\\(.*\\)'/\\1/p" pgrdf.control)
          # META.json check matches the Makefile check-meta target
          # (Makefile line 5). Both top-level "version" and the
          # provides.pgrdf.version field are checked.
          META_TOP=$(python3 -c "import json; print(json.load(open('META.json'))['version'])")
          META_PROV=$(python3 -c "import json; print(json.load(open('META.json'))['provides']['pgrdf']['version'])")
          echo "tag (stripped):                ${TAG_VER}"
          echo "Cargo.toml version:            ${CARGO_VER}"
          echo "pgrdf.control default_version: ${CTL_VER}"
          echo "META.json version (top):       ${META_TOP}"
          echo "META.json provides.pgrdf.version: ${META_PROV}"
          MISMATCH=0
          if [ "${TAG_VER}" != "${CARGO_VER}" ]; then
            echo "::error::Cargo.toml version (${CARGO_VER}) does not match tag (${TAG_VER})."
            MISMATCH=1
          fi
          if [ "${TAG_VER}" != "${CTL_VER}" ]; then
            echo "::error::pgrdf.control default_version (${CTL_VER}) does not match tag (${TAG_VER})."
            MISMATCH=1
          fi
          if [ "${TAG_VER}" != "${META_TOP}" ]; then
            echo "::error::META.json top-level version (${META_TOP}) does not match tag (${TAG_VER})."
            MISMATCH=1
          fi
          if [ "${TAG_VER}" != "${META_PROV}" ]; then
            echo "::error::META.json provides.pgrdf.version (${META_PROV}) does not match tag (${TAG_VER})."
            MISMATCH=1
          fi
          if [ "${MISMATCH}" -eq 1 ]; then
            echo "::error::Bump ALL of Cargo.toml + pgrdf.control + META.json (both fields) to ${TAG_VER} before re-tagging."
            echo "::error::See PROVENANCE.md Rule 7 + v0.5.24 OCI-GERMINATION NOTIFIES for context."
            exit 1
          fi

      - name: Build extension package
        run: cargo pgrx package --pg-config /usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config

      # SPEC.pgRDF.INSTALL.v0.2 §3 layout:
      #   pgrdf-<ver>-pg<PG>-glibc-<arch>.tar.gz
      #     ├── lib/pgrdf.so
      #     ├── share/extension/pgrdf.control
      #     ├── share/extension/pgrdf--<ver>.sql
      #     ├── LICENSE
      #     └── SHA256SUMS
      - name: Repack to INSTALL-spec layout
        id: pack
        run: |
          set -euo pipefail
          VER="${GITHUB_REF_NAME#v}"
          PKG="target/release/pgrdf-pg${{ matrix.pg }}"
          OUT="pgrdf-${VER}-pg${{ matrix.pg }}-glibc-${{ matrix.arch }}"
          mkdir -p "${OUT}/lib" "${OUT}/share/extension"
          cp "${PKG}/usr/lib/postgresql/${{ matrix.pg }}/lib/pgrdf.so"            "${OUT}/lib/"
          cp "${PKG}/usr/share/postgresql/${{ matrix.pg }}/extension/"*.control   "${OUT}/share/extension/"
          cp "${PKG}/usr/share/postgresql/${{ matrix.pg }}/extension/"*.sql       "${OUT}/share/extension/"
          # Ship upgrade-path SQL files from the source tree (the
          # 0.5.1 -> 0.5.24 bridge added in v0.5.24, plus any future
          # `pgrdf--X--Y.sql` upgrade scripts). `cargo pgrx package`
          # does not auto-discover these; they live in `sql/` and we
          # opt them into the INSTALL layout explicitly. The glob is
          # safe-guarded so an empty source tree doesn't fail.
          if compgen -G "sql/pgrdf--*--*.sql" > /dev/null; then
            cp sql/pgrdf--*--*.sql "${OUT}/share/extension/"
          fi
          cp LICENSE "${OUT}/"
          # versions MANIFEST.json (#37) — a self-describing record of every
          # version-bearing fact, built from the ACTUAL repacked artifact
          # (control `default_version` + SQL filenames read back), so the
          # manifest can never disagree with what shipped. A consumer
          # (oci-germination's versions.yaml, a downstream bundle) reads ONE
          # file instead of grepping filenames / pinning by hand — the gap
          # that let the consumer pin rot. `runtime.value` == the tag:
          # `pgrdf.version()` is `env!(CARGO_PKG_VERSION)` (compile-time,
          # asserted == tag in the pre-build step), and oci-publish's gate
          # boots + asserts `pgrdf.version() == tag` before any attestation.
          CTL_DEFAULT=$(grep -E '^default_version' "${OUT}/share/extension/pgrdf.control" | head -1 | cut -d"'" -f2)
          INSTALL_SQL=$(cd "${OUT}/share/extension" && ls "pgrdf--${VER}.sql" 2>/dev/null | head -1)
          UPGRADE_SQL=$(cd "${OUT}/share/extension" && ls pgrdf--*--"${VER}.sql" 2>/dev/null | head -1)
          BUILT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > "${OUT}/MANIFEST.json" <<JSON
          {
            "component": "pgrdf",
            "version": "${VER}",
            "extversion": "${CTL_DEFAULT}",
            "runtime": { "fn": "pgrdf.version()", "value": "${VER}", "source": "env!(CARGO_PKG_VERSION) compile-time; asserted == tag pre-build + boot-gated in oci-publish" },
            "install_sql": "${INSTALL_SQL}",
            "upgrade_sql": "${UPGRADE_SQL}",
            "platform": { "pg_major": "${{ matrix.pg }}", "arch": "${{ matrix.arch }}", "base": "postgres:17.4-bookworm (glibc)" },
            "build": { "tag": "${GITHUB_REF_NAME}", "git_sha": "${GITHUB_SHA}", "built": "${BUILT}" },
            "integrity": "SHA256SUMS (sibling file)"
          }
          JSON
          # SHA256SUMS hashes every file INCLUDING MANIFEST.json (covers it for integrity).
          ( cd "${OUT}" && find . -type f ! -name SHA256SUMS -print0 | xargs -0 sha256sum > SHA256SUMS )
          tar czf "${OUT}.tar.gz" "${OUT}"
          echo "tarball=${OUT}.tar.gz" >> "$GITHUB_OUTPUT"

      # Post-build version-coherence gate (PROVENANCE.md Rule 7).
      #
      # The bug v0.5.24 fixes (OCI-GERMINATION report 2026-05-30) is
      # that `pgrdf--<wrong-ver>.sql` and `default_version='<wrong>'`
      # silently shipped because Cargo.toml's version had been stuck.
      # Independent of the pre-build assertion, verify the actual
      # output: the filename present in `share/extension/` must
      # include `pgrdf--${VER}.sql`, and the control file's
      # `default_version` must equal `${VER}`. Failure aborts the
      # upload — a wrong-labeled tarball never reaches release-time.
      - name: Post-build — assert layout labels match tag
        run: |
          set -euo pipefail
          VER="${GITHUB_REF_NAME#v}"
          OUT="pgrdf-${VER}-pg${{ matrix.pg }}-glibc-${{ matrix.arch }}"
          SQL_FILE="${OUT}/share/extension/pgrdf--${VER}.sql"
          CONTROL="${OUT}/share/extension/pgrdf.control"
          if [ ! -f "${SQL_FILE}" ]; then
            echo "::error::Expected ${SQL_FILE} missing from tarball layout."
            echo "::error::Files actually present:"
            ls -la "${OUT}/share/extension/" || true
            exit 1
          fi
          DEFAULT_VER=$(grep -E '^default_version' "${CONTROL}" | head -1 | cut -d"'" -f2)
          if [ "${DEFAULT_VER}" != "${VER}" ]; then
            echo "::error::pgrdf.control default_version is ${DEFAULT_VER}, expected ${VER}."
            exit 1
          fi
          echo "✓ SQL file: ${SQL_FILE}"
          echo "✓ default_version: ${DEFAULT_VER}"
          # MANIFEST.json coherence (#37): version/extversion/runtime must all == tag,
          # and the SQL filenames it records must exist in the layout.
          MAN="${OUT}/MANIFEST.json"
          [ -f "${MAN}" ] || { echo "::error::MANIFEST.json missing from tarball layout."; exit 1; }
          jq -e . "${MAN}" >/dev/null || { echo "::error::MANIFEST.json is not valid JSON."; exit 1; }
          for k in version extversion .runtime.value; do
            key="${k#.}"; mv=$(jq -r ".${key}" "${MAN}")
            [ "${mv}" = "${VER}" ] || { echo "::error::MANIFEST.json .${key}=${mv}, expected ${VER}."; exit 1; }
          done
          MAN_INSTALL=$(jq -r .install_sql "${MAN}")
          [ -f "${OUT}/share/extension/${MAN_INSTALL}" ] || { echo "::error::MANIFEST.json install_sql=${MAN_INSTALL} not in layout."; exit 1; }
          echo "✓ MANIFEST.json: version=$(jq -r .version "${MAN}") extversion=$(jq -r .extversion "${MAN}") runtime=$(jq -r .runtime.value "${MAN}")"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pack.outputs.tarball }}
          path: ${{ steps.pack.outputs.tarball }}

  release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        # Need full history + tags so `git for-each-ref refs/tags/<v>`
        # below returns the tag annotation message body (the per-release
        # body the maintainer wrote when running `git tag -a -F`).
        with:
          fetch-depth: 0
          fetch-tags: true

      # `actions/checkout@v4 fetch-tags: true` fetches tag REFS but
      # NOT the annotated tag OBJECTS. So `git for-each-ref
      # refs/tags/<v> --format='%(contents)'` falls through to the
      # COMMIT's message (the merge commit at the tag's ref) instead
      # of the tag annotation. Caught on v0.5.29 release.yml run
      # 26705375440 — the pre-publish gate fired exactly as designed
      # ("body does not contain 0.5.29") because the rendered body
      # was the commit's "Merge branch 'main' of …" auto-message.
      #
      # Explicit `git fetch --tags --force origin` here replaces
      # the shallow tag refs with full annotated tag objects, so
      # the message becomes available to `for-each-ref` in the next
      # step.
      - name: Refetch annotated tag objects (actions/checkout #1467)
        run: |
          set -euo pipefail
          git fetch --tags --force origin
          echo "tag type for ${GITHUB_REF_NAME}: $(git cat-file -t ${GITHUB_REF_NAME} 2>&1 || echo missing)"

      - uses: actions/download-artifact@v4
        with: { path: artifacts, merge-multiple: true }
      - name: Build PGXN source archive
        run: make dist
      - name: Generate aggregate SHA256SUMS
        run: |
          set -euo pipefail
          mv pgrdf-*.zip artifacts/
          cd artifacts
          sha256sum pgrdf-*.tar.gz pgrdf-*.zip > SHA256SUMS
          cat SHA256SUMS

      # Build the GitHub Release body from the TAG ANNOTATION the
      # maintainer wrote at `git tag -a -F`. The prior pipeline used
      # `body_path: RELEASE_NOTES.md`, a checked-in file that hadn't
      # been touched since v0.5.1 — so every release v0.5.10..v0.5.28
      # surfaced stale v0.5.1 marketing text on github.com. The tag
      # annotation is always per-release-current by construction
      # (it's what `tag -a` captured at tag time).
      #
      # Falls back to the CHANGELOG.md [Unreleased] section if the
      # tag has no annotation body (defensive — every release this
      # pipeline cuts SHOULD have an annotation; the fallback exists
      # so a stale tag doesn't ship an empty body).
      - name: Render Release body from tag annotation
        id: body
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          ANNO=$(git for-each-ref "refs/tags/${TAG}" --format='%(contents)' || true)
          # `git for-each-ref %(contents)` includes the GPG signature
          # block (if any) — strip it.
          ANNO=$(printf '%s' "${ANNO}" | sed '/^-----BEGIN PGP SIGNATURE-----/,$d')
          if [ -z "${ANNO//[[:space:]]/}" ]; then
            echo "::warning::tag ${TAG} has no annotation body; falling back to CHANGELOG.md [Unreleased] section"
            # Pull the [Unreleased] block (between the [Unreleased] heading
            # and the next ## heading). Better than nothing.
            ANNO=$(awk '/^## \[Unreleased\]/{flag=1; next} /^## /{flag=0} flag' CHANGELOG.md)
          fi
          printf '%s\n' "${ANNO}" > /tmp/release_body.md
          echo "------ Release body ------"
          head -40 /tmp/release_body.md
          echo "------"

      # Gate: assert the rendered body actually mentions the current
      # tag string. Prevents the v0.5.1-stuck-RELEASE_NOTES.md class
      # of stale-content leak from recurring under any future
      # template/file-pointer change.
      - name: Pre-publish — assert Release body mentions tag
        run: |
          set -euo pipefail
          TAG_VER="${GITHUB_REF_NAME#v}"
          if ! grep -q "${TAG_VER}" /tmp/release_body.md; then
            echo "::error::Rendered Release body does NOT contain '${TAG_VER}'."
            echo "::error::This guard catches stale RELEASE_NOTES.md / empty annotation."
            echo "::error::Either (a) re-tag with an annotation that names the version, or"
            echo "::error::        (b) update CHANGELOG.md [Unreleased] to mention v${TAG_VER}."
            echo "------ Rendered body that failed the check ------"
            cat /tmp/release_body.md
            exit 1
          fi
          echo "✓ Release body mentions ${TAG_VER}"

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/pgrdf-*.tar.gz
            artifacts/pgrdf-*.zip
            artifacts/SHA256SUMS
          body_path: /tmp/release_body.md
          generate_release_notes: true
          # Hold the release as a DRAFT until the OCI bundle is pushed,
          # boot+version-gated (oci-publish `gate` job), attested,
          # attestation-verified, and recorded in LATEST.md.
          # update-latest-md.yml flips it live (`gh release edit
          # --draft=false --latest`) as its final step. A code release is
          # therefore NEVER publicly advertised without a matching,
          # verified OCI bundle behind it. Draft assets stay downloadable
          # by the workflow token, so oci-publish's `gh release download`
          # keeps working; drafts don't fire `release: published`, and the
          # chain runs on repository_dispatch anyway.
          draft: true
          make_latest: false
      # Chain oci-publish.yml via repository_dispatch.
      #
      # The `release: [published]` event does NOT fire downstream
      # workflows when the release is created by another workflow using
      # the default GITHUB_TOKEN (a GitHub security boundary against
      # workflow recursion). Without this dispatch, oci-publish.yml
      # never runs automatically and the OCI bundle on
      # ghcr.io/styk-tv/pgrdf-bundle silently stays stuck at whatever
      # was last published by hand. The dispatch fires reliably even
      # under GITHUB_TOKEN.
      - name: Trigger oci-publish workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          echo "Dispatching oci-publish-release for ${TAG}"
          gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/dispatches" \
            -f event_type=oci-publish-release \
            -F "client_payload[tag]=${TAG}"
