name: release
on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  PGRX_VERSION: "0.16"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        pg: ["14", "15", "16", "17"]
        arch: [amd64, arm64]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-22.04' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-pgrx
        with: { pg: "${{ matrix.pg }}" }

      - name: Build extension package
        run: cargo pgrx package --pg-config /usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config

      # SPEC.pgRDF.INSTALL.v0.2 §3 layout:
      #   pgrdf-<ver>-pg<PG>-glibc-<arch>.tar.gz
      #     ├── lib/pgrdf.so
      #     ├── share/extension/pgrdf.control
      #     ├── share/extension/pgrdf--<ver>.sql
      #     ├── LICENSE
      #     └── SHA256SUMS
      - name: Repack to INSTALL-spec layout
        id: pack
        run: |
          set -euo pipefail
          VER="${GITHUB_REF_NAME#v}"
          PKG="target/release/pgrdf-pg${{ matrix.pg }}"
          OUT="pgrdf-${VER}-pg${{ matrix.pg }}-glibc-${{ matrix.arch }}"
          mkdir -p "${OUT}/lib" "${OUT}/share/extension"
          cp "${PKG}/usr/lib/postgresql/${{ matrix.pg }}/lib/pgrdf.so"            "${OUT}/lib/"
          cp "${PKG}/usr/share/postgresql/${{ matrix.pg }}/extension/"*.control   "${OUT}/share/extension/"
          cp "${PKG}/usr/share/postgresql/${{ matrix.pg }}/extension/"*.sql       "${OUT}/share/extension/"
          cp LICENSE "${OUT}/"
          ( cd "${OUT}" && find . -type f ! -name SHA256SUMS -print0 | xargs -0 sha256sum > SHA256SUMS )
          tar czf "${OUT}.tar.gz" "${OUT}"
          echo "tarball=${OUT}.tar.gz" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pack.outputs.tarball }}
          path: ${{ steps.pack.outputs.tarball }}

  release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: artifacts, merge-multiple: true }
      - name: Build PGXN source archive
        run: make dist
      - name: Generate aggregate SHA256SUMS
        run: |
          set -euo pipefail
          mv pgrdf-*.zip artifacts/
          cd artifacts
          sha256sum pgrdf-*.tar.gz pgrdf-*.zip > SHA256SUMS
          cat SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/pgrdf-*.tar.gz
            artifacts/pgrdf-*.zip
            artifacts/SHA256SUMS
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
      # Chain oci-publish.yml via repository_dispatch.
      #
      # The `release: [published]` event does NOT fire downstream
      # workflows when the release is created by another workflow using
      # the default GITHUB_TOKEN (a GitHub security boundary against
      # workflow recursion). Without this dispatch, oci-publish.yml
      # never runs automatically and the OCI bundle on
      # ghcr.io/styk-tv/pgrdf-bundle silently stays stuck at whatever
      # was last published by hand. The dispatch fires reliably even
      # under GITHUB_TOKEN.
      - name: Trigger oci-publish workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          echo "Dispatching oci-publish-release for ${TAG}"
          gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/dispatches" \
            -f event_type=oci-publish-release \
            -F "client_payload[tag]=${TAG}"
