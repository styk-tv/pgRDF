name: update-latest-md

# Refresh LATEST.md from GHCR — but ONLY after SLSA Build Provenance v1
# attestations verify for the head digests on `ghcr.io/styk-tv/pgrdf-bundle`.
# Closes PROVENANCE.md Rule 3 strictly: from when this workflow ships,
# every write to LATEST.md is from this workflow + every write is gated
# on `gh attestation verify` accepting every digest the file would
# advertise.
#
# pgRDF ships a single OCI surface (extension only — no web layer), so
# this workflow is simpler than the pgCK sibling: one head, one render,
# one commit.

on:
  # `workflow_run` (the natural choice here) is blocked by GitHub's
  # GITHUB_TOKEN cascade restriction: when a workflow is triggered via
  # GITHUB_TOKEN (oci-publish.yml is, via the repository_dispatch from
  # release.yml), its completion does NOT fire `workflow_run` events
  # downstream. `repository_dispatch` IS allowed to cascade from
  # GITHUB_TOKEN-triggered runs, so we chain via that — oci-publish.yml's
  # final step POSTs an `oci-publish-completed` dispatch which we
  # listen for here. Same pattern as dd55afb's
  # release.yml → oci-publish.yml fix, extended one more hop.
  repository_dispatch:
    types: [latest-md-refresh]
  workflow_dispatch:
    inputs:
      version:
        description: "version to (re)render, no leading v (e.g. 0.5.10)"
        required: true

permissions:
  contents: write
  packages: read
  attestations: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # `git rev-list -n 1 v<ver>` in render-latest-md.py needs
          # tags. Default checkout fetches only the head commit and
          # no tags, so the renderer falls back to the API path,
          # which previously returned the tag-OBJECT sha for
          # annotated tags (the cause of LATEST.md's misleading
          # "Built from commit" pointer on v0.5.21 — see commit
          # log). fetch-tags=true is cheap and removes a class of
          # API-path-only failure modes.
          fetch-tags: true
          fetch-depth: 0

      # ────────────────────────────────────────────────────────────
      # Resolve the version to render.
      # ────────────────────────────────────────────────────────────
      # Three trigger paths, each carries the version differently:
      # - repository_dispatch  → github.event.client_payload.tag (with v)
      # - workflow_dispatch    → inputs.version (no v expected; tolerate both)
      # Belt-and-braces: if no version came in via the event, fall
      # back to "highest X.Y.Z-pg17-amd64 tag on GHCR" so a stale
      # dispatch still resolves the actual head correctly.
      - name: Resolve head version
        id: head
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            workflow_dispatch)
              VER="${{ inputs.version }}"
              ;;
            repository_dispatch)
              VER="${{ github.event.client_payload.tag }}"
              ;;
            *)
              VER=""
              ;;
          esac
          # Strip leading `v` if present.
          VER="${VER#v}"
          if [ -z "${VER}" ]; then
            VER=$(gh api -H "Accept: application/vnd.github+json" \
              "/users/${OWNER}/packages/container/pgrdf-bundle/versions" --paginate \
              --jq '.[].metadata.container.tags[]' \
              | grep -E '^[0-9]+\.[0-9]+\.[0-9]+-pg17-amd64$' \
              | sort -V | tail -1 \
              | sed 's/-pg17-amd64$//')
          fi
          if [ -z "${VER}" ]; then
            echo "could not resolve a head version from event or GHCR" >&2
            exit 1
          fi
          echo "ver=${VER}" >> "$GITHUB_OUTPUT"
          echo "Head: v${VER}"

      # ────────────────────────────────────────────────────────────
      # Verify SLSA Build Provenance v1 on the head digests. THIS is
      # the gate that enforces PROVENANCE.md Rule 2. If any verify
      # fails, the job exits non-zero before reaching the renderer +
      # commit step — LATEST.md is not touched.
      # ────────────────────────────────────────────────────────────
      - name: Verify attestations on head digests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER:    ${{ github.repository_owner }}
          VER:      ${{ steps.head.outputs.ver }}
        run: |
          set -euo pipefail
          # Aggregate index + pg17 leaves (amd64, arm64). The other PG
          # majors get verified-on-render in the next iteration once
          # the matrix is expanded; at minimum the head row in
          # LATEST.md (pg17) must be fully attested.
          for ref in \
            "oci://ghcr.io/${OWNER}/pgrdf-bundle:${VER}" \
            "oci://ghcr.io/${OWNER}/pgrdf-bundle:${VER}-pg17-amd64" \
            "oci://ghcr.io/${OWNER}/pgrdf-bundle:${VER}-pg17-arm64" \
          ; do
            echo "::group::verify ${ref}"
            gh attestation verify "${ref}" --repo "${GITHUB_REPOSITORY}"
            echo "::endgroup::"
          done

      # ────────────────────────────────────────────────────────────
      # Resolve SPEC.OCI.BUNDLE.v0.3 §2.2 metadata that the renderer
      # surfaces in the metadata block: the tag SHA (`Built from
      # commit`) and the workflow-run URL (`Built by`). Pre-resolving
      # here avoids the renderer doing nested `gh api` calls and lets
      # the workflow log the resolved values for the audit trail.
      # Both values are passed to the renderer via env. If either
      # resolves empty (e.g. `workflow_dispatch` against an unreleased
      # version), the renderer falls back to its internal resolver and
      # ultimately to a labelled degraded display.
      # ────────────────────────────────────────────────────────────
      - name: Resolve v0.3 §2.2 metadata
        id: spec22
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER:    ${{ github.repository_owner }}
          VER:      ${{ steps.head.outputs.ver }}
        run: |
          set -euo pipefail
          # Tag → commit SHA. The `/commits/v${VER}` endpoint
          # auto-dereferences refs/tags/v${VER} to the underlying
          # commit. Earlier code used `/git/ref/tags/v${VER}` with
          # `.object.sha`, which for ANNOTATED tags returns the
          # tag-object SHA (a different object — not a commit), and
          # downstream consumers ended up linking to a non-commit.
          SHA=$(gh api -H "Accept: application/vnd.github+json" \
            "repos/${OWNER}/${GITHUB_REPOSITORY#*/}/commits/v${VER}" \
            --jq '.sha' 2>/dev/null || true)
          # Fallback parse — different `gh api` versions phrase the
          # `repos/<owner>/<repo>` segment differently; the workflow
          # already has `GITHUB_REPOSITORY` set to `<owner>/<repo>`.
          if [ -z "${SHA}" ]; then
            SHA=$(gh api -H "Accept: application/vnd.github+json" \
              "repos/${GITHUB_REPOSITORY}/commits/v${VER}" \
              --jq '.sha' 2>/dev/null || true)
          fi
          echo "built_from_sha=${SHA}" >> "$GITHUB_OUTPUT"
          # Workflow-run URL — most-recent `release.yml` run at SHA.
          URL=""
          if [ -n "${SHA}" ]; then
            URL=$(gh api -H "Accept: application/vnd.github+json" \
              "repos/${GITHUB_REPOSITORY}/actions/runs?event=push&head_sha=${SHA}" \
              --jq '[.workflow_runs[] | select(.path == ".github/workflows/release.yml")] | sort_by(.created_at) | reverse | .[0].html_url // ""' \
              2>/dev/null || true)
          fi
          echo "built_by_url=${URL}" >> "$GITHUB_OUTPUT"
          echo "v0.3 §2.2: built_from_sha=${SHA:-(unresolved)}"
          echo "v0.3 §2.2: built_by_url=${URL:-(unresolved, renderer will fall back)}"

      # ────────────────────────────────────────────────────────────
      # Render and commit if changed.
      # ────────────────────────────────────────────────────────────
      - name: Render LATEST.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          VER: ${{ steps.head.outputs.ver }}
          BUILT_FROM_SHA: ${{ steps.spec22.outputs.built_from_sha }}
          BUILT_BY_URL:   ${{ steps.spec22.outputs.built_by_url }}
        run: |
          set -euo pipefail
          python3 tools/render-latest-md.py > LATEST.md.new
          mv LATEST.md.new LATEST.md

      - name: Commit refresh if changed
        env:
          VER: ${{ steps.head.outputs.ver }}
        run: |
          set -euo pipefail
          if git diff --quiet LATEST.md; then
            echo "LATEST.md already current — nothing to do"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add LATEST.md
          {
            echo "docs(auto): refresh LATEST.md to v${VER}"
            echo
            echo "Generated by .github/workflows/update-latest-md.yml after a"
            echo "successful oci-publish.yml run AND after SLSA Build Provenance"
            echo "v1 attestations verified via 'gh attestation verify' for the"
            echo "pg17 head digests + aggregate index. Do not edit by hand."
            echo
            echo "[skip ci]"
          } > /tmp/commit-msg.txt
          git commit -F /tmp/commit-msg.txt
          git push origin main

      # ────────────────────────────────────────────────────────────
      # Advertise the release — the FINAL gate. Only now, after the OCI
      # bundle is pushed, boot+version-gated (oci-publish `gate` job),
      # attested, attestation-verified above, and recorded in LATEST.md,
      # do we flip the GitHub release from draft to public + mark it
      # Latest. release.yml creates it as a draft; any upstream failure
      # ⇒ it stays a draft and is never advertised. So a visible GitHub
      # release ⇔ a verified, advertised OCI bundle.
      #
      # `gh release edit --draft=false` via GITHUB_TOKEN does NOT cascade
      # to re-trigger oci-publish's `release: [published]` listener —
      # the same GITHUB_TOKEN boundary the rest of the chain relies on.
      # ────────────────────────────────────────────────────────────
      - name: Advertise the GitHub release (draft -> latest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VER: ${{ steps.head.outputs.ver }}
        run: |
          set -euo pipefail
          gh release edit "v${VER}" --repo "${GITHUB_REPOSITORY}" --draft=false --latest
          echo "✓ Advertised v${VER}: draft cleared, marked Latest."
