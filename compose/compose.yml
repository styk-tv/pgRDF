# pgRDF local-dev compose.
#
# Filename `compose.yml` per the Compose Spec convention; recognised
# automatically by both `docker compose` and `podman compose`.
#
# Stock postgres:17.4-bookworm. No image rebuild, no entrypoint
# wrapper, no init script. The locally-built extension files are
# placed at the canonical Postgres paths via per-file bind mounts.
#
# Why per-file bind mounts and not the INSTALL spec §7 GUC path:
# `extension_control_path` arrives in PG 18, and pgrx 0.17+/0.18 do
# not yet build on current rustc (see specs/ERRATA.v0.2.md E-006).
# We pin to PG 17 + pgrx 0.16 until pgrx catches up; bind-mounting
# individual files at $libdir / $sharedir/extension is the spec-
# compliant local incarnation of "drop-in extension files, no image
# rebuild".
#
# Boot sequence:
#   1. just build-ext        # builds .so/.control/.sql into ./extensions/
#   2. podman compose up -d  # boots Postgres with the bind mounts
#   3. psql ... -c 'CREATE EXTENSION pgrdf;'

services:
  # TG-3 v2 — compose-startup parity gate.
  #
  # A one-shot init container that runs BEFORE postgres starts. Hashes
  # the bind-mounted extension files and verifies internal consistency
  # (.control's default_version matches the pgrdf--<ver>.sql filename;
  # neither .so nor .sql is empty). Exits non-zero on any drift.
  # postgres `depends_on` it with
  # `condition: service_completed_successfully`, so a failed check
  # blocks postgres from starting — the realistic drift case (release
  # cut bumped pgrdf.control but compose.yml still mounts the previous
  # SQL file) gets caught at compose-up rather than later at
  # CREATE EXTENSION time.
  pgrdf-parity:
    image: docker.io/library/busybox:1.36
    container_name: ${PGRDF_PARITY_CONTAINER:-pgrdf-parity}
    restart: "no"
    volumes:
      - ./extensions:/extensions:ro,z
      - ./parity-check.sh:/parity-check.sh:ro,z
    command: ["sh", "/parity-check.sh"]

  postgres:
    image: docker.io/library/postgres:17.4-bookworm
    container_name: ${PGRDF_CONTAINER:-pgrdf-pgrdf-postgres}
    restart: unless-stopped
    depends_on:
      pgrdf-parity:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pgrdf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pgrdf}
      POSTGRES_DB: ${POSTGRES_DB:-pgrdf}
    command:
      - postgres
      - -c
      - shared_preload_libraries=pgrdf
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./pg-data:/var/lib/postgresql/data:z
      # Drop the extension files at canonical PG 17 paths. These bind
      # mounts require the files to exist on the host first - produced
      # by `just build-ext` (see compose/README.md).
      #
      # Phase F group F4 (infra-debt fix). Two problems with the old
      # block, both fixed here:
      #
      #  1. It pinned five per-version SQL files
      #     (`pgrdf--0.4.1.sql` … `pgrdf--0.4.5.sql`) by hardcoded
      #     bind-mount line. `just build-ext` does
      #     `rm -rf compose/extensions/share` then exports exactly
      #     what `cargo pgrx package` generates — and a CLEAN build
      #     emits only the *current* `default_version`'s
      #     `pgrdf--<ver>.sql` (the older files only ever appeared
      #     because a warm BuildKit `/work/target` cache had retained
      #     them across rebuilds — non-deterministic). So every stale
      #     per-version line referenced a source file a clean build
      #     does not produce, and each dispatch had to hand-create a
      #     gitignored copy + cold-restart. Now exactly one SQL line,
      #     tracking the current version. `CREATE EXTENSION pgrdf`
      #     only ever needs `pgrdf--<default_version>.sql` (pgRDF v0.x
      #     does not support `ALTER EXTENSION … UPDATE`), so a single
      #     line is complete; a release cut changes just this one line
      #     to the new version (same surface as every prior cut, no
      #     accumulation).
      #
      #  2. It must stay a PER-FILE mount, never a directory mount
      #     over `$sharedir/extension`: a directory mount shadows the
      #     stock Postgres extension dir and `initdb` then cannot find
      #     `plpgsql.control`, crash-looping the container on a fresh
      #     data dir — exactly the clean-cluster path CI takes
      #     (`compose/pg-data` is gitignored, so CI always initdb's
      #     from scratch). Per-file mounts drop pgRDF in beside the
      #     stock extensions instead of hiding them.
      - ./extensions/lib/pgrdf.so:/usr/lib/postgresql/17/lib/pgrdf.so:ro,z
      - ./extensions/share/extension/pgrdf.control:/usr/share/postgresql/17/extension/pgrdf.control:ro,z
      - ./extensions/share/extension/pgrdf--0.5.40.sql:/usr/share/postgresql/17/extension/pgrdf--0.5.40.sql:ro,z
      # Read-only ontology + regression fixtures, reachable from the
      # postgres process at /fixtures (see pgrdf.load_turtle path arg).
      - ../fixtures:/fixtures:ro,z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pgrdf} -d ${POSTGRES_DB:-pgrdf}"]
      interval: 10s
      timeout: 5s
      retries: 5
