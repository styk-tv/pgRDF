# project-azure-pgRDF — local-dev stack.
#
# Boots two services:
#   pg    — stock postgres:17.4-bookworm + pgRDF extension files bind-mounted
#           from the vendored vendor/pgRDF/compose/extensions/
#   app   — python:3.12-slim that pip-installs requirements.txt, mounts our
#           app/ source, and runs uvicorn with --reload for live dev
#
# Paths are relative to the directory of this file (project root).
#
# Start:    docker-compose -f compose.local.yml up
# Stop:     docker-compose -f compose.local.yml down
# Reset:    docker-compose -f compose.local.yml down -v && rm -rf pgdata/
#
# (Use `docker-compose` not `docker compose` — the workstation has the v2
# standalone binary, not the compose plugin.)

services:
  pg:
    image: docker.io/library/postgres:17.4-bookworm
    container_name: pgrdf-local-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-pgrdf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pgrdf}
      POSTGRES_DB:       ${POSTGRES_DB:-pgrdf}
    command:
      - postgres
      - -c
      - shared_preload_libraries=pgrdf
    # Host-side port for psql access. Internal app→pg traffic uses the
    # compose network (pg:5432) regardless. Default 5433 to avoid colliding
    # with anyone else's local postgres on 5432.
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      # Named volume (Docker-managed) avoids the macOS host-bind chown error.
      # Wipe with `docker-compose -f compose.local.yml down -v` if you need a fresh initdb.
      - pgrdf_pgdata:/var/lib/postgresql/data
      # pgRDF 0.4.3 extension files (built via `just build-ext` inside vendor/pgRDF/)
      - ./vendor/pgRDF/compose/extensions/lib/pgrdf.so:/usr/lib/postgresql/17/lib/pgrdf.so:ro
      - ./vendor/pgRDF/compose/extensions/share/extension/pgrdf.control:/usr/share/postgresql/17/extension/pgrdf.control:ro
      - ./vendor/pgRDF/compose/extensions/share/extension/pgrdf--0.4.2.sql:/usr/share/postgresql/17/extension/pgrdf--0.4.2.sql:ro
      - ./vendor/pgRDF/compose/extensions/share/extension/pgrdf--0.4.3.sql:/usr/share/postgresql/17/extension/pgrdf--0.4.3.sql:ro
      # Read-only ontology + regression fixtures, reachable at /fixtures
      - ./vendor/pgRDF/fixtures:/fixtures:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pgrdf} -d ${POSTGRES_DB:-pgrdf}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: docker.io/library/python:3.12-slim
    container_name: pgrdf-local-app
    working_dir: /workspace
    command:
      - bash
      - -lc
      - |
        set -e
        pip install -q --root-user-action=ignore -r requirements.txt
        exec python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/workspace/app:ro
      - ./requirements.txt:/workspace/requirements.txt:ro
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      PROJECT_SLUG: local-dev
      TEAM_ID:      local-dev-team
      PG_HOST:      pg
      PG_PORT:      "5432"
      PG_DB:        ${POSTGRES_DB:-pgrdf}
      PG_USER:      ${POSTGRES_USER:-pgrdf}
      PG_PASS:      ${POSTGRES_PASSWORD:-pgrdf}
      STATIC_DIR:   /workspace/app/static
      KC_ISSUER:    https://id.tech.games/realms/techgames
      KC_AUDIENCES: ck-web,account
      KC_CLIENT_ID: ck-web
    depends_on:
      pg:
        condition: service_healthy

volumes:
  pgrdf_pgdata:
    name: pgrdf_local_pgdata
